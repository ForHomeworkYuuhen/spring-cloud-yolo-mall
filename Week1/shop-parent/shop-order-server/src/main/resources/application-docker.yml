# docker profile：容器内通过 compose 服务名互访（覆盖 application.yml 中的 localhost）
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/shop-order?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
    sentinel:
      transport:
        dashboard: sentinel-dashboard:8858
  zipkin:
    base-url: http://zipkin:9411/
