# docker profile：容器内通过 compose 服务名互访（覆盖 application.yml 中的 localhost）
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/shop-product?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
  zipkin:
    base-url: http://zipkin:9411/

# 商品识别：容器内访问宿主机上的算法服务，用 host.docker.internal
reco:
  service:
    url: http://host.docker.internal:8123
