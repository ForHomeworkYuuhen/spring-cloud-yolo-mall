# Week1 依赖环境一键启动：MySQL + Nacos + Zipkin + Sentinel Dashboard
#
# 用法（在 Week1 目录下，需先安装 Docker Desktop 并启动）：
#   docker compose up -d        # 后台启动全部依赖
#   docker compose ps           # 查看状态
#   docker compose logs -f nacos
#   docker compose down         # 停止（加 -v 连数据卷一起删）
#
# 说明：
# - 所有端口都映射到宿主机 localhost，和三个微服务的 application.yml 完全一致，
#   因此微服务继续在 IDEA 里直接运行即可，无需改任何配置。
# - MySQL 首次启动会自动执行 ./sql 下的脚本，建好 shop-product / shop-order 两个库及数据。
# - root 密码设为 12345，与 application.yml 中的 datasource 密码一致。
services:
  mysql:
    image: mysql:8.0
    container_name: shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "12345"
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    ports:
      - "3307:3306"   # 主机用 3307（避开其他项目占用的 3306）；容器间仍走内部 mysql:3306
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro      # 首次启动自动建库建表
      - shop-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p12345"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:1.4.2
    container_name: shop-nacos
    restart: unless-stopped
    environment:
      MODE: standalone               # 单机模式，内嵌 derby，免装数据库
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"                  # 控制台 http://localhost:8848/nacos （nacos/nacos）
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  zipkin:
    image: openzipkin/zipkin:2
    container_name: shop-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"                  # UI http://localhost:9411

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.0
    container_name: shop-sentinel
    restart: unless-stopped
    ports:
      - "8080:8858"                  # bladex 版控制台内部监听 8858，映射到主机 8080。控制台 http://localhost:8080 （sentinel/sentinel）

  # ---------- 三个微服务：容器内用 Maven 构建并运行 ----------
  product-server:
    build:
      context: ./shop-parent
      dockerfile: shop-product-server/Dockerfile
    image: shop-product-server:1.0
    container_name: shop-product-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker   # dev 用于配置中心 DataID，docker 覆盖各中间件地址
      TZ: Asia/Shanghai
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  order-server:
    build:
      context: ./shop-parent
      dockerfile: shop-order-server/Dockerfile
    image: shop-order-server:1.0
    container_name: shop-order-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD: sentinel-dashboard:8858   # 控制台实际端口 8858
    ports:
      - "8091:8091"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  gateway:
    build:
      context: ./shop-parent
      dockerfile: shop-gateway/Dockerfile
    image: shop-gateway:1.0
    container_name: shop-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD: sentinel-dashboard:8858   # 控制台实际端口 8858
    ports:
      - "9000:9000"
    depends_on:
      nacos:
        condition: service_healthy

  # 用户服务（登录/注册，BCrypt 加密）
  user-server:
    build:
      context: ./shop-parent
      dockerfile: shop-user-server/Dockerfile
    image: shop-user-server:1.0
    container_name: shop-user-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
    ports:
      - "8071:8071"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  # 前端（nginx 静态托管：仿淘宝首页/登录/识别）
  frontend:
    image: nginx:alpine
    container_name: shop-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./shop-frontend:/usr/share/nginx/html:ro
      - ./nginx-no-cache.conf:/etc/nginx/conf.d/default.conf:ro   # 禁缓存，改了刷新即生效

volumes:
  shop-mysql-data:
