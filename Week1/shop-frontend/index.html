<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粤海购</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar"><div class="wrap">
  <div id="userArea">请 <a class="hi" href="login.html">登录</a> / <a href="login.html">注册</a></div>
  <div><a href="reco-test.html">热门推荐</a><a href="orders.html">我的订单</a><a href="cart.html">购物车</a></div>
</div></div>

<header class="header"><div class="wrap">
  <a class="brand" href="index.html">粤海购<small>GDOU SHOP</small></a>
  <nav class="nav">
    <a href="index.html">首页</a><a href="#all">全部商品</a>
  </nav>
  <div class="tools">
    <svg class="ic" viewBox="0 0 24 24" title="我的账户" onclick="goAccount()"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    <a class="cart-wrap" href="cart.html" title="购物车">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 5h2l2.5 12h11l2-8H7"/><circle cx="9" cy="20" r="1.3"/><circle cx="18" cy="20" r="1.3"/></svg>
      <span class="cart-badge" id="cartBadge" style="display:none"></span>
    </a>
  </div>
</div></header>

<div class="searchbar"><div class="wrap">
  <div class="searchrow">
    <div class="searchbox">
      <svg class="s-ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input id="kw" placeholder="搜索零食、品牌或口味" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="s-btn" type="button" onclick="doSearch()">搜索</button>
    </div>
    <a class="reco-btn" href="recognize.html">
      <svg viewBox="0 0 24 24"><path d="M4 8h3l1.5-2.5h7L17 8h3v11H4z"/><circle cx="12" cy="13" r="3.5"/></svg>
      商品识别
    </a>
  </div>
</div></div>

<div class="wrap">
  <!-- hero -->
  <section class="hero">
    <div class="eyebrow">2025 精选</div>
    <h1>进口零食 ·<br>嘴巴停不下来</h1>
    <p>薯片、膨化、饼干，挑你爱吃的口味，下单到家。</p>
    <a class="cta" href="#all">浏览全部商品 →</a>
  </section>

  <!-- 猜你喜欢 -->
  <section class="sec" id="reco">
    <div class="eyebrow">RECOMMENDED</div>
    <h2>猜你喜欢</h2>
    <div class="note">根据你的浏览与口味偏好，为你精选。</div>
  </section>
  <div class="grid" id="recoGrid"></div>

  <!-- 全部商品 -->
  <section class="sec" id="all"><div class="eyebrow">CATALOG</div><h2>全部商品</h2></section>
  <div class="grid" id="grid"></div>
</div>

<footer>粤海购 · 广东海洋大学23级信管实训</footer>

<script src="js/app.js"></script>
<script>
let ALL = [];
const SEARCH_MAP = { '辣':'chili','番茄':'ketchup','茄汁':'ketchup','醋':'vinegar','酸':'vinegar','咸':'salty','奶油':'cream','洋葱':'onion','薯片':'chips','饼干':'biscuit','土豆':'potato','奇多':'cheetoz' };
function doSearch(){
  const raw = document.getElementById('kw').value.trim();
  if(!raw){ document.getElementById('grid').innerHTML = ALL.map(cardHTML).join(''); return; }
  const k = (SEARCH_MAP[raw] || raw).toLowerCase();
  const hits = ALL.filter(p => (p.name + ' ' + p.shop).toLowerCase().includes(k));
  document.getElementById('grid').innerHTML = hits.length
    ? hits.map(cardHTML).join('')
    : '<div class="empty-state" style="grid-column:1/-1"><div class="es-title">没有找到“' + raw + '”相关的商品</div><div class="es-sub">换个关键词试试，或问问右下角的 AI 客服～</div></div>';
  document.getElementById('all').scrollIntoView({ behavior:'smooth' });
}
(async function(){
  renderUser();
  ALL = await fetchProducts();
  const recs = await fetchRecommend(currentUser(), ALL, 4);
  document.getElementById('recoGrid').innerHTML = recs.map(cardHTML).join('');
  document.getElementById('grid').innerHTML = ALL.map(cardHTML).join('');
})();
</script>
</body>
</html>
