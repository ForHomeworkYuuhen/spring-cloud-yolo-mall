<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品详情 — 粤海购</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar"><div class="wrap">
  <div id="userArea">请 <a class="hi" href="login.html">登录</a> / <a href="login.html">注册</a></div>
  <div><a href="reco-test.html">热门推荐</a><a href="orders.html">我的订单</a><a href="cart.html">购物车</a></div>
</div></div>

<header class="header"><div class="wrap">
  <a class="brand" href="index.html">粤海购<small>GDOU SHOP</small></a>
  <nav class="nav"><a href="index.html">首页</a><a href="index.html#all">全部商品</a></nav>
  <div class="tools">
    <svg class="ic" viewBox="0 0 24 24" title="我的账户" onclick="goAccount()"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    <a class="cart-wrap" href="cart.html" title="购物车">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 5h2l2.5 12h11l2-8H7"/><circle cx="9" cy="20" r="1.3"/><circle cx="18" cy="20" r="1.3"/></svg>
      <span class="cart-badge" id="cartBadge" style="display:none"></span>
    </a>
  </div>
</div></header>

<div class="wrap">
  <a class="back" href="index.html">← 返回</a>
  <div id="pd"></div>
</div>

<footer>粤海购 · 广东海洋大学23级信管实训</footer>

<script src="js/app.js"></script>
<script>
const PID = parseInt(new URLSearchParams(location.search).get('id'), 10);
let CUR = null;
async function load(){
  renderUser();
  let p = null;
  try {
    const r = await fetch(`${GATEWAY}/admin/products/${PID}`, { signal: AbortSignal.timeout(2000) });
    if(r.ok) p = await r.json();   // 真实数据：商品微服务
  } catch(e){}
  const m = MOCK.find(x => x.id === PID) || {};
  CUR = {
    id: PID,
    name: m.name || (p && p.name) || '商品',
    price: (p && p.price != null) ? p.price : (m.price || 0),
    stock: (p && p.stock != null) ? p.stock : 5000,
    emoji: m.emoji || '🍪',
    shop: m.shop || '官方旗舰店',
    sales: m.sales || 0,
  };
  render();
}
function render(){
  const p = CUR;
  document.getElementById('pd').innerHTML = `
    <div class="pd">
      <div class="pd-img"><span class="emoji">${p.emoji}</span></div>
      <div class="pd-info">
        <h1>${p.name}</h1>
        <div class="pd-shop">${p.shop}</div>
        <div class="pd-price"><small>¥</small>${Number(p.price).toFixed(2)}</div>
        <div class="pd-meta">
          <div><b>已售</b>${p.sales}+ 件</div>
          <div><b>库存</b>${p.stock} 件</div>
          <div><b>配送</b>广东海洋大学 · 预计次日达</div>
        </div>
        <div class="qty">
          <button onclick="step(-1)">−</button>
          <input id="qty" value="1" readonly>
          <button onclick="step(1)">+</button>
        </div>
        <div class="pd-actions">
          <button class="btn ghost" onclick="addCart()">加入购物车</button>
          <button class="btn" onclick="buyNow()">立即购买</button>
        </div>
      </div>
    </div>`;
}
function step(d){
  const el = document.getElementById('qty');
  el.value = Math.max(1, (parseInt(el.value, 10) || 1) + d);
}
function qty(){ return parseInt(document.getElementById('qty').value, 10) || 1; }
function addCart(){ addToCart(PID, qty()); }
function buyNow(){ addToCart(PID, qty()); setTimeout(() => location.href = 'cart.html', 400); }
load();
</script>
</body>
</html>
