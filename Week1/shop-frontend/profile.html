<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 — 粤海购</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar"><div class="wrap">
  <div id="userArea">请 <a class="hi" href="login.html">登录</a> / <a href="login.html">注册</a></div>
  <div><a href="reco-test.html">热门推荐</a><a href="orders.html">我的订单</a><a href="cart.html">购物车</a></div>
</div></div>

<header class="header"><div class="wrap">
  <a class="brand" href="index.html">粤海购<small>GDOU SHOP</small></a>
  <nav class="nav"><a href="index.html">首页</a><a href="index.html#all">全部商品</a></nav>
  <div class="tools">
    <svg class="ic" viewBox="0 0 24 24" title="我的账户" onclick="goAccount()"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    <a class="cart-wrap" href="cart.html" title="购物车">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 5h2l2.5 12h11l2-8H7"/><circle cx="9" cy="20" r="1.3"/><circle cx="18" cy="20" r="1.3"/></svg>
      <span class="cart-badge" id="cartBadge" style="display:none"></span>
    </a>
  </div>
</div></header>

<div class="wrap">
  <a class="back" href="index.html">← 返回首页</a>
  <section class="sec" style="margin-top:8px"><div class="eyebrow">MY ACCOUNT</div><h2>个人中心</h2></section>
  <div id="pf"></div>
</div>

<footer>粤海购 · 广东海洋大学23级信管实训</footer>

<script src="js/app.js"></script>
<script>
async function load(){
  renderUser();
  const u = currentUser();
  if(!u){
    document.getElementById('pf').innerHTML =
      '<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><div class="es-title">请先登录</div><div class="es-sub">登录后查看你的个人资料</div><a class="cta" href="login.html">去登录</a></div>';
    return;
  }
  let info = { username: u, nickname: u, phone: '—' };
  try {
    const r = await fetch(`${GATEWAY}/user/info`, { headers: { Authorization: 'Bearer ' + token() }, signal: AbortSignal.timeout(2000) });
    const d = await r.json();
    if(d && d.code === 0) info = d;   // 真实资料：用户微服务（凭 JWT 取本人信息）
  } catch(e){}
  const initial = (info.nickname || info.username || 'U').slice(0,1).toUpperCase();
  document.getElementById('pf').innerHTML = `
    <div class="profile-card">
      <div class="pc-avatar">${initial}</div>
      <div class="pc-row"><span>用户名</span><b>${info.username || '—'}</b></div>
      <div class="pc-row"><span>昵称</span><b>${info.nickname || info.username || '—'}</b></div>
      <div class="pc-row"><span>手机号</span><b>${info.phone || '—'}</b></div>
      <div class="pc-links">
        <button class="btn ghost" style="width:auto;padding:0 26px" onclick="location.href='orders.html'">我的订单</button>
        <button class="btn ghost" style="width:auto;padding:0 26px" onclick="location.href='cart.html'">购物车</button>
        <button class="btn" style="width:auto;padding:0 30px" onclick="doLogout()">退出登录</button>
      </div>
    </div>`;
}
function doLogout(){ logout(); toast('已退出登录'); setTimeout(() => location.href = 'index.html', 600); }
load();
</script>
</body>
</html>
