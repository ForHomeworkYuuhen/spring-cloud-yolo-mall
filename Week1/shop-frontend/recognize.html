<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品识别 — 粤海购</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar"><div class="wrap">
  <div id="userArea">请 <a class="hi" href="login.html">登录</a> / <a href="login.html">注册</a></div>
  <div><a href="reco-test.html">热门推荐</a><a href="orders.html">我的订单</a><a href="cart.html">购物车</a></div>
</div></div>

<header class="header"><div class="wrap">
  <a class="brand" href="index.html">粤海购<small>GDOU SHOP</small></a>
  <nav class="nav"><a href="index.html">首页</a><a href="index.html#all">全部商品</a></nav>
  <div class="tools">
    <svg class="ic" viewBox="0 0 24 24" title="我的账户" onclick="goAccount()"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
    <a class="cart-wrap" href="cart.html" title="购物车">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 5h2l2.5 12h11l2-8H7"/><circle cx="9" cy="20" r="1.3"/><circle cx="18" cy="20" r="1.3"/></svg>
      <span class="cart-badge" id="cartBadge" style="display:none"></span>
    </a>
  </div>
</div></header>

<div class="wrap">
  <a class="back" href="index.html">← 返回首页</a>
  <section class="sec" style="margin-top:6px">
    <div class="eyebrow">AI RECOGNITION</div>
    <h2>商品识别</h2>
    <div class="note">拍照或上传零食图片，自动识别并直达对应商品，支持薯片、膨化、饼干等多种零食。</div>
  </section>

  <div class="model-pick" id="modelPick" role="group" aria-label="选择识别模型"></div>

  <div class="reco2">
    <!-- 左：图片 + 操作 -->
    <div class="reco2-left">
      <div class="reco2-stage" id="stage">
        <div class="drop" id="drop">
          <input type="file" id="file" accept="image/*" hidden>
          <span class="drop-ic"><svg viewBox="0 0 24 24"><path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M5 20h14"/></svg></span>
          <div class="drop-main">点击或拖拽图片到此上传</div>
          <div class="drop-sub">支持 JPG / PNG，单张图片</div>
        </div>
        <div class="canvas-wrap" id="canvasWrap" style="display:none">
          <img id="preview" class="preview" alt="预览">
          <canvas id="overlay" class="overlay"></canvas>
        </div>
      </div>
      <div class="reco2-actions">
        <button class="btn ghost" id="reupload" onclick="pickFile()" style="display:none">换 一 张</button>
        <button class="btn" id="btn" disabled onclick="recognize()">开 始 识 别</button>
      </div>
    </div>

    <!-- 右：识别结果（直达商品） -->
    <div class="reco2-right">
      <div class="reco2-rhead">识别结果 <span id="rcount"></span></div>
      <div class="reco-meta" id="resmeta"></div>
      <div class="reco-list" id="result">
        <div class="reco-empty2">
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="1"/><circle cx="8.5" cy="10" r="1.5"/><path d="M3 16l5-4 4 3 3-2 6 5"/></svg>
          <div>上传图片并识别后，结果与对应商品显示在这里</div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>粤海购 · 广东海洋大学23级信管实训</footer>

<script src="js/app.js"></script>
<script>
// 图片上传走微服务：前端 → 网关(/reco) → 商品服务 → 算法层 AI 服务
const RECO = "http://localhost:9000/reco";
const FALLBACK_MODELS = [
  { value: "11s_balanced", label: "11s 推荐", default: true },
  { value: "11s_base",     label: "11s 基础" },
  { value: "12x_balanced", label: "12x 大模型" },
];

const file = document.getElementById('file'), drop = document.getElementById('drop');
const preview = document.getElementById('preview'), btn = document.getElementById('btn'), reupload = document.getElementById('reupload');
const result = document.getElementById('result'), modelPick = document.getElementById('modelPick');
const canvasWrap = document.getElementById('canvasWrap'), overlay = document.getElementById('overlay');
const rcount = document.getElementById('rcount'), resmeta = document.getElementById('resmeta');
let imgFile = null, currentModel = FALLBACK_MODELS[0].value, modelLabels = {}, lastRender = null;
const PROD_BY_NAME = Object.fromEntries((typeof MOCK !== 'undefined' ? MOCK : []).map(p => [p.name, p]));

// 识别结果会话内持久化：从详情页返回时恢复，回到首页则清空
function dataURLtoFile(durl, name){
  const [meta, b64] = durl.split(',');
  const mime = (meta.match(/:(.*?);/) || [, 'image/jpeg'])[1];
  const bin = atob(b64), u8 = new Uint8Array(bin.length);
  for(let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return new File([u8], name, { type: mime });
}
function saveState(data){
  if(!imgFile) return;
  const r = new FileReader();
  r.onload = () => { try { sessionStorage.setItem('reco_state', JSON.stringify({ img: r.result, model: currentModel, data })); } catch(e){} };
  r.readAsDataURL(imgFile);
}
function restoreState(){
  let s; try { s = JSON.parse(sessionStorage.getItem('reco_state') || 'null'); } catch(e){ s = null; }
  if(!s || !s.img) return;
  currentModel = s.model || currentModel;
  modelPick.querySelectorAll('.seg').forEach(b => b.classList.toggle('on', b.dataset.val === currentModel));
  imgFile = dataURLtoFile(s.img, 'restored.jpg');
  drop.style.display = 'none'; canvasWrap.style.display = 'inline-block'; reupload.style.display = ''; btn.disabled = false;
  preview.onload = () => { render(s.data); };
  preview.src = s.img;
}

// ---- 模型选择器 ----
async function loadModels(){
  let models = null;
  try {
    const r = await fetch(`${RECO}/models`, { signal: AbortSignal.timeout(3000) });
    if(!r.ok) throw 0;
    const data = await r.json();
    const arr = Array.isArray(data) ? data : (data.models || []);
    if(arr.length) models = arr.map(m => typeof m === 'string'
      ? { value: m, label: m }
      : { value: m.value || m.key || m.name || m.id, label: m.label || m.name || m.value || m.key, default: !!m.default });
  } catch(e){}
  if(!models || !models.length) models = FALLBACK_MODELS;
  const def = models.find(m => m.default) || models[0];
  currentModel = def.value;
  modelPick.innerHTML = models.map(m =>
    `<button type="button" class="seg${m.value === currentModel ? ' on' : ''}" data-val="${m.value}">${m.label}</button>`).join('');
  modelLabels = {};
  models.forEach(m => { modelLabels[m.value] = m.label; });
  modelPick.querySelectorAll('.seg').forEach(b => {
    b.onclick = () => {
      currentModel = b.dataset.val;
      modelPick.querySelectorAll('.seg').forEach(x => x.classList.toggle('on', x === b));
      if(imgFile) recognize();
    };
  });
}
loadModels().then(restoreState);

// ---- 选图 ----
let _picking = false;
function pickFile(){ if(_picking) return; _picking = true; file.click(); setTimeout(() => { _picking = false; }, 700); }
drop.onclick = pickFile;
file.onchange = e => { if(e.target.files[0]) show(e.target.files[0]); };
drop.ondragover = e => { e.preventDefault(); };
drop.ondrop = e => { e.preventDefault(); if(e.dataTransfer.files[0]) show(e.dataTransfer.files[0]); };

function show(f){
  imgFile = f; lastRender = null;
  preview.onload = () => { clearOverlay(); };
  preview.src = URL.createObjectURL(f);
  drop.style.display = 'none';
  canvasWrap.style.display = 'inline-block';
  reupload.style.display = '';
  btn.disabled = false;
  rcount.textContent = ''; resmeta.textContent = '';
  result.innerHTML = '<div class="reco-empty2"><div>已选择图片，点击「开始识别」</div></div>';
}

// ---- 识别 ----
async function recognize(){
  if(!imgFile) return;
  result.innerHTML = '<div class="reco-empty2"><div>识别中…</div></div>';
  clearOverlay();
  try {
    const fd = new FormData();
    fd.append('file', imgFile); fd.append('model', currentModel);
    const r = await fetch(`${RECO}/recognize`, { method:'POST', body: fd, signal: AbortSignal.timeout(8000) });
    if(!r.ok) throw 0;
    render(await r.json());
  } catch(e){
    toast("（识别服务未启动，显示示例结果）");
    render({ model: currentModel, device: "cpu", infer_ms: 0,
      image_w: preview.naturalWidth, image_h: preview.naturalHeight,
      detections: [{ name: "Cheetoz salty chips", conf: 0.97, box: [preview.naturalWidth*0.2, preview.naturalHeight*0.2, preview.naturalWidth*0.8, preview.naturalHeight*0.8] }] });
  }
}

// ---- 渲染：画框 + 结果直达商品 ----
function render(data){
  const dets = (data && data.detections) || [];
  const imgW = (data && data.image_w) || preview.naturalWidth || 1;
  const imgH = (data && data.image_h) || preview.naturalHeight || 1;
  if(!dets.length){
    clearOverlay(); rcount.textContent = ''; resmeta.textContent = '';
    result.innerHTML = '<div class="reco-empty2"><div>未识别到商品，换张清晰点的图片试试～</div></div>';
    return;
  }
  lastRender = { dets, w: imgW, h: imgH };
  drawBoxes(dets, imgW, imgH);

  rcount.textContent = '· 共 ' + dets.length + ' 个';
  const label = modelLabels[data && data.model] || (data && data.model) || currentModel;
  const ms = (data && data.infer_ms != null) ? data.infer_ms : '—';
  resmeta.textContent = `模型 ${label} · 设备 ${(data && data.device) || '—'} · 用时 ${ms}ms`;

  result.innerHTML = dets.map(d => {
    const pct = (d.conf || 0) * 100;
    const p = PROD_BY_NAME[d.name];
    const buy = p
      ? `<div class="ri-buy">
           <span class="ri-price"><small>¥</small>${Number(p.price).toFixed(2)}</span>
           <a class="ri-link" href="product.html?id=${p.id}">查看商品</a>
           <button class="ri-add" onclick="addToCart(${p.id})">加入购物车</button>
         </div>`
      : `<div class="ri-buy"><span style="color:#999;font-size:12.5px">商城暂未上架</span></div>`;
    return `<div class="reco-item">
        <div class="ri-emoji">${p ? p.emoji : '🔍'}</div>
        <div class="ri-main">
          <div class="ri-name"><span>${d.name}</span><span class="ri-pct">${pct.toFixed(1)}%</span></div>
          <div class="bar-track"><div class="bar" style="width:${pct.toFixed(0)}%"></div></div>
          ${buy}
        </div>
      </div>`;
  }).join('');
  saveState(data);
}

// ---- canvas 叠加画框 ----
function clearOverlay(){ const ctx = overlay.getContext('2d'); ctx && ctx.clearRect(0, 0, overlay.width, overlay.height); }
function boxOf(d){ if(Array.isArray(d.box)) return d.box; if(Array.isArray(d.xyxy)) return d.xyxy; if(d.x1 != null) return [d.x1, d.y1, d.x2, d.y2]; return null; }
function drawBoxes(dets, imgW, imgH){
  const dispW = preview.clientWidth, dispH = preview.clientHeight;
  if(!dispW || !dispH) return;
  overlay.width = dispW; overlay.height = dispH;
  const sx = dispW / imgW, sy = dispH / imgH;
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, dispW, dispH);
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#bb4a2c';
  ctx.lineWidth = 2; ctx.strokeStyle = accent;
  ctx.font = '600 13px -apple-system,"Microsoft YaHei",Arial,sans-serif'; ctx.textBaseline = 'top';
  dets.forEach(d => {
    const b = boxOf(d); if(!b) return;
    const x = b[0]*sx, y = b[1]*sy, w = (b[2]-b[0])*sx, h = (b[3]-b[1])*sy;
    ctx.strokeRect(x, y, w, h);
    const txt = `${d.name} ${(d.conf*100).toFixed(0)}%`;
    const tw = ctx.measureText(txt).width;
    const ty = y - 18 >= 0 ? y - 18 : y;
    ctx.fillStyle = accent; ctx.fillRect(x, ty, tw + 10, 18);
    ctx.fillStyle = '#fff'; ctx.fillText(txt, x + 5, ty + 2);
  });
}
window.addEventListener('resize', () => { if(lastRender) drawBoxes(lastRender.dets, lastRender.w, lastRender.h); });
</script>
</body>
</html>
